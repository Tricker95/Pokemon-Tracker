<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Tracker Pokémon Pro</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Mon Pokédex Personnel</h1>
        <nav>
            <button id="btn-shiny" onclick="showSection('shiny')">Shiny Tracker</button>
            <button id="btn-hof" onclick="showSection('hof')">Hall of Fame</button>
            <button id="btn-theme" class="theme-icon-btn" onclick="toggleTheme()" title="Changer le thème">🌙</button>
        </nav>
    </header>

    <main>
        <div class="data-management">
            <button onclick="exportData()" class="btn-save">💾 Sauvegarder (.json)</button>
            <button onclick="importData()" class="btn-load">📂 Charger</button>
            
            <div class="search-bar">
                <label>🔍</label>
                <input type="text" id="search-shiny-input" placeholder="Nom (anglais) ou ID..." onkeypress="if(event.key === 'Enter') searchShiny()">
                <button onclick="searchShiny()" class="btn-search">Chercher</button>
                <button onclick="resetSearch()" class="btn-reset">❌</button>
            </div>
        </div>

        <section id="shiny-section">
            
            <div id="live-hunt-module" class="live-hunt-container" style="display: none;">
                <h2>🔴 Shasse en cours</h2>
                
                <div class="live-hunt-content">
                    <div class="live-hunt-info">
                        <img id="live-hunt-img" src="">
                        <h3 id="live-hunt-name">Nom</h3>
                        <p id="live-hunt-nickname">(Surnom)</p>
                        <p id="live-hunt-odds">Probabilité : ?</p>
                    </div>

                    <div class="live-hunt-actions">
                        <p>Rencontres / Resets</p>
                        <div id="live-hunt-counter">0</div>
                        <button onclick="incrementLiveHunt()" class="btn-clicker">+1
